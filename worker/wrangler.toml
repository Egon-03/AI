name = "lumen-ai-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Set this to your published site's origin once you know it, e.g.
# "https://ai.grassi.swiss" or "https://egon-03.github.io", to restrict
# who can call this worker. Leave as "*" while testing locally.
[vars]
ALLOWED_ORIGIN = "*"

# The Groq API key is NOT set here — it must stay a secret.
# After deploying, run:
#   wrangler secret put GROQ_API_KEY
